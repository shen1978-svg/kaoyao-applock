name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.2

      - name: Build with Gradle
        run: gradle assembleDebug --stacktrace

      - name: Upload to Transfer.sh
        run: |
          curl --upload-file app/build/outputs/apk/debug/app-debug.apk https://transfer.sh/KaoYao_AppLock_Final.apk > transfer_url.txt
          echo "Download URL: $(cat transfer_url.txt)"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: KaoYao_AppLock_Debug.apk
          path: app/build/outputs/apk/debug/*.apk
